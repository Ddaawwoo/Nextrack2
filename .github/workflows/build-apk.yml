name: Sestavit APK

on:
  workflow_dispatch:
  push:
    branches:
      - chatgpt-dev
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Stáhnout repozitář
        uses: actions/checkout@v4

      - name: Nastavit Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package.json

      - name: Nainstalovat Capacitor
        run: npm install

      - name: Připravit webové soubory
        shell: bash
        run: |
          set -euo pipefail
          rm -rf www android
          mkdir -p www/icons
          cp index.html manifest.json sw.js gdrive-advanced.js www/
          cp logo.png source.png mega.png googledrive.png dropbox.png settings.png www/
          cp -R icons/. www/icons/

      - name: Vytvořit Android projekt
        run: npx cap add android

      - name: Synchronizovat web do Androidu
        run: npx cap sync android

      - name: Nastavit Javu 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Nastavit Android SDK
        uses: android-actions/setup-android@v3

      - name: Sestavit debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace assembleDebug

      - name: Uložit APK ke stažení
        uses: actions/upload-artifact@v4
        with:
          name: Nextrack2-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

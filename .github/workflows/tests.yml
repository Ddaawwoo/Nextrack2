name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check JavaScript syntax
        run: |
          node --check gdrive-advanced.js
          node --check dropbox-advanced.js
          node --check sw.js
      - name: Run JavaScript tests
        run: node --test tests/dropbox_oauth.test.js
      - name: Run Python regression tests
        run: python -m unittest discover -s tests -v
